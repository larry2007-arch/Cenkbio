<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cenk Torun: The Cinematic Fan Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #b8860b;
            --deep-red: #8b0000;
            --bg-black: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-black);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        h1, h2 { font-family: 'Playfair Display', serif; }

        /* Navigation */
        nav {
            background: rgba(0,0,0,0.9);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--gold);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 3px; }
        .logo span { color: var(--gold); }

        .lang-btns button {
            background: transparent;
            border: 1px solid var(--gold);
            color: white;
            padding: 5px 10px;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.3s;
        }

        .lang-btns button:hover { background: var(--gold); color: black; }

        /* Hero */
        .hero {
            height: 70vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), var(--bg-black)), 
                        url('https://via.placeholder.com/1920x1080/111/gold?text=Cenk+Torun+Hero'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 { font-size: 3.5rem; margin: 0; }

        /* Ad Slots */
        .ad-banner {
            width: 100%; max-width: 728px; height: 90px;
            background: var(--glass); margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            border: 1px dashed #444;
        }

        /* Grid */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; padding: 40px 5%;
        }

        .card {
            background: var(--glass); padding: 25px;
            border-left: 4px solid var(--gold);
            transition: 0.3s;
        }

        .btn-action {
            display: inline-block;
            background: var(--deep-red);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            margin-top: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* VIDEO VAULT MODAL */
        .video-vault {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            justify-content: center; align-items: center;
        }

        .vault-content {
            width: 90%; max-width: 400px;
            border: 2px solid var(--gold);
            position: relative;
            background: #000;
        }

        .close-vault {
            position: absolute; top: -45px; right: 0;
            color: var(--gold); font-size: 35px; cursor: pointer;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">CENK <span>ULTIMATE</span></div>
    <div class="lang-btns">
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ro')">RO</button>
        <button onclick="changeLang('bg')">BG</button>
    </div>
</nav>

<section class="hero">
    <h1 id="hero-title">The Legend Returns</h1>
    <p id="hero-sub">Exclusive insights into the life of Cenk Torun.</p>
    <!-- Adsterra Smartlink goes here -->
    <a href="https://blessingrecordpleasant.com/b4ep65dt14?key=0dcb056279c80bbed9e40391a0765eac" class="btn-action" id="hero-btn">LATEST NEWS</a>
</section>

<!-- Adsterra Banner Slot -->
<div class="ad-banner">
    <script async="async" data-cfasync="false" src="https://blessingrecordpleasant.com/5ed03cd0176a00d4d55c21623fb7707d/invoke.js"></script>
<div id="container-5ed03cd0176a00d4d55c21623fb7707d"></div>
    
    <p style="color:#555; font-size: 10px;">PROMOTED CONTENT</p>
</div>

<section class="content-grid">
    <div class="card">
        <h2 id="card1-title">The 'OrHir' Legacy</h2>
        <p id="card1-text">Deep dive into the chemistry between Orhun and Hira.</p>
        <button class="btn-action" onclick="alert('Redirecting to full article...')">READ MORE</button>
    </div>

    <div class="card">
        <h2 id="card2-title">Style Transitions</h2>
        <p id="card2-text">Watch exclusive visual transitions of Cenk's most iconic looks.</p>
        <button class="btn-action" id="watch-btn" onclick="openVault()">WATCH NOW</button>
    </div>
</section>

<!-- The Video Pop-up -->
<div id="videoVault" class="video-vault">
    <div class="vault-content">
        <span class="close-vault" onclick="closeVault()">&times;</span>
        <video id="cenkVideo" width="100%" controls loop>
            <source src="cenk.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
    const content = {
        en: {
            title: "The Legend Returns", sub: "Exclusive insights into the life of Cenk Torun.",
            btn: "LATEST NEWS", c1t: "The 'OrHir' Legacy", c1p: "Deep dive into the chemistry between Orhun and Hira.",
            c2t: "Style Transitions", c2p: "Watch exclusive visual transitions of Cenk's most iconic looks.",
            watch: "WATCH NOW"
        },
        ro: {
            title: "Legenda se Întoarce", sub: "Informații exclusive despre viața lui Cenk Torun.",
            btn: "ULTIMELE ȘTIRI", c1t: "Moștenirea 'OrHir'", c1p: "Analiză detaliată a chimiei dintre Orhun și Hira.",
            c2t: "Tranziții de Stil", c2p: "Urmărește tranziții vizuale exclusive cu look-urile lui Cenk.",
            watch: "VEZI ACUM"
        },
        bg: {
            title: "Легендата се завръща", sub: "Ексклузивен поглед върху живота на Дженк Торун.",
            btn: "ПОСЛЕДНИ НОВИНИ", c1t: "Наследството 'OrHir'", c1p: "Дълбоко гмуркане в химията между Орхун и Хира.",
            c2t: "Стилни преходи", c2p: "Гледайте ексклузивни визуални преходи на Дженк.",
            watch: "ГЛЕДАЙ СЕГА"
        }
    };

    function changeLang(lang) {
        document.getElementById('hero-title').innerText = content[lang].title;
        document.getElementById('hero-sub').innerText = content[lang].sub;
        document.getElementById('hero-btn').innerText = content[lang].btn;
        document.getElementById('card1-title').innerText = content[lang].c1t;
        document.getElementById('card1-text').innerText = content[lang].c1p;
        document.getElementById('card2-title').innerText = content[lang].c2t;
        document.getElementById('card2-text').innerText = content[lang].c2p;
        document.getElementById('watch-btn').innerText = content[lang].watch;
    }

    function openVault() {
        document.getElementById('videoVault').style.display = 'flex';
        document.getElementById('cenkVideo').play();
    }

    function closeVault() {
        document.getElementById('videoVault').style.display = 'none';
        document.getElementById('cenkVideo').pause();
    }
</script>

    <script src="https://blessingrecordpleasant.com/6d/1e/be/6d1ebe42fda6885c85819e5779b078e5.js"></script>
    
</body>
            </html>
